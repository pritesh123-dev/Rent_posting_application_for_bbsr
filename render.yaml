databases:
  - name: rentapp-db
    plan: free
    databaseName: rentapp
    user: rentapp

services:
  - type: web
    name: roomfinder-bbsr-api
    plan: free
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DB_URL
        fromDatabase:
          name: rentapp-db
          property: connectionString
      - key: DB_USER
        fromDatabase:
          name: rentapp-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: rentapp-db
          property: password
      - key: DB_DRIVER
        value: org.postgresql.Driver
      - key: SPRING_PROFILES_ACTIVE
        value: postgres
  - type: web
    name: roomfinder-bbsr-ui
    plan: free
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /api/*
        destination: https://roomfinder-bbsr-api.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html
