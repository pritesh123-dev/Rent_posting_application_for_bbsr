server:
  port: ${PORT:8080}
  servlet:
    context-path: /

spring:
  application:
    name: room-finder-bbsr
  datasource:
    url: ${DB_URL:jdbc:h2:file:./data/rentapp;AUTO_SERVER=TRUE}
    username: ${DB_USER:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    show-sql: false
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 20MB

app:
  listing:
    free-limit: 2000
  upload:
    dir: ${UPLOAD_DIR:./uploads}
  ratelimit:
    requests-per-minute: 60

logging:
  level:
    com.rentapp: INFO
