server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: rent-app-bbsr
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/rentapp}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 20MB

app:
  listing:
    free-limit: 2000
  upload:
    dir: ${UPLOAD_DIR:./uploads}
  ratelimit:
    requests-per-minute: 60

logging:
  level:
    com.rentapp: INFO
